# 53-voacap-cgi-timeouts.conf
# Place at: /etc/lighttpd/conf-enabled/54-voacap-cgi-timeouts.conf
#
# The four HamClock /ham/HamClock/fetch*.pl scripts run as Perl CGI under
# lighttpd. Each is a thin LWP::UserAgent shim that calls the voacap-service
# container, where VOACAP itself can take up to ~120s for area/TOA/MUF maps.
#
# Lighttpd's default server.max-read-idle is 60s, which would otherwise kill
# the CGI process before voacap-service finishes. Bump it to 300s for these
# routes so the inner Python subprocess timeout (120s) and the Perl LWP
# timeout (300s) both have room to fire first with clean error messages.
#
# Timeout chain (shortest to outermost):
#   Band conditions: subprocess(30s) < nginx(45s) < perl LWP(45s) < lighttpd(300s) < harakiri(300s)
#   Area / TOA / MUF: subprocess(120s) < nginx(300s) < perl LWP(300s) < lighttpd(300s) < harakiri(300s)

setenv.add-environment += ( "VOACAP_SERVICE_HOST" => env.VOACAP_SERVICE_HOST )

$HTTP["url"] =~ "^/ham/HamClock/fetch(VOACAPArea|VOACAP-TOA|VOACAP-MUF|BandConditions)\.pl" {
    # Set your timeouts for these specific URLs
    server.max-read-idle  = 300
    server.max-write-idle = 360

    # Forward all matched requests to the unified async backend daemon
    proxy.server = (
        "" => ((
            "host" => "127.0.0.1",
            "port" => 8081
        ))
    )
}
