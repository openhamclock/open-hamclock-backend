# Use include_shell to conditionally enable the proxy based on ALPHA_INSTALL.
# This avoids parser quirks in global scopes regarding environment variable tests.
include_shell "
  if [ -n \"$ALPHA_INSTALL\" ] && [ \"$ALPHA_INSTALL\" != 'true' ]; then
    cat <<EOF
proxy.server = (
  \"/ham/HamClock/maps/\" => ( (
    \"host\" => \"$ALPHA_INSTALL\",
    \"port\" => 80
  ) )
)
EOF
  fi
"