# OHB voacap-service proxy config for lighttpd
# Place at: /etc/lighttpd/conf-enabled/53-voacap-proxy.conf
# Requires mod_proxy to be loaded:
#   sudo lighttpd-enable-mod proxy
#   sudo service lighttpd restart

server.modules += ( "mod_proxy" )

# ---------------------------------------------------------------------------
# Long-running VOACAP routes (area / TOA / MUF maps)
#
# These call voacapl with METHOD 130, which can take 60-120s. The Python
# subprocess timeout is 120s; nginx and uWSGI both allow 300s. Lighttpd's
# default server.max-read-idle of 60s would otherwise sever the connection
# before the map renders — bump it to 300s to match the rest of the stack.
#
# Note: lighttpd's mod_proxy uses server.max-read-idle for upstream response
# idle time. On lighttpd >= 1.4.46 you can also use proxy.read-timeout, but
# server.max-read-idle works on every version and is set here for portability.
# ---------------------------------------------------------------------------

$HTTP["url"] =~ "^/ham/HamClock/fetchVOACAP(Area|-TOA|-MUF)\.pl" {
    proxy.server = ( "" => (( "host" => "172.21.0.3", "port" => 8080 )) )
    proxy.forwarded = ( "for" => 1 )
    setenv.add-response-header = ()

    server.max-read-idle  = 300
    server.max-write-idle = 360
}
