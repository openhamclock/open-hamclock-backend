# Use include_shell to conditionally enable the proxy based on PROXY_MAPS.
# This avoids parser quirks in global scopes regarding environment variable tests.
include_shell "
  if [ -n \"$PROXY_MAPS\" ] && [ \"$PROXY_MAPS\" != 'false' ]; then
    cat <<EOF
proxy.server = (
  \"/ham/HamClock/maps/\" => ( (
    \"host\" => \"$PROXY_MAPS\",
    \"port\" => 80
  ) )
)
EOF
  fi
"
