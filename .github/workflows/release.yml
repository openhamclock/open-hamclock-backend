name: Release with manage-ohb-docker.sh asset

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name (e.g., v0.0.1)'
        required: true
        default: 'v0.0.0'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required to create releases

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Prepare assets
        run: |
          # Define asset names with the tag
          TAG="${{ inputs.tag_name || github.ref_name }}"
          REF="${{ github.ref_name }}"
          MGR_NAME="manage-ohb-docker-$TAG.sh"
          VERIFY_NAME="verify_firmware_integrity-$TAG.pl"

          # create the distribution directory and clean up any old ones
          mkdir dist

          # create a manager with version in the name and file
          sed "s/^\(OHB_MANAGER_VERSION=\).*$/\1$TAG/" ./docker/manage-ohb-docker.sh \
          > "./docker/$MGR_NAME"

          # create the integrity utility with version injected
          sed "s/\(my \$VERSION = \)\"[^\"]*\"/\1\"$TAG\"/" \
          ./scripts/utility/verify_firmware_integrity.pl \
          > "./dist/$VERIFY_NAME"

          # add version artifact
          echo "TAG=$TAG" > VERSION.txt

          # create the source bundles using git archive for a clean package
          git archive --format=tar.gz --output="dist/OHB-$TAG.tar.gz" HEAD
          git archive --format=zip --output="dist/OHB-$TAG.zip" HEAD

          # Generate checksums for all assets
          cd dist && sha256sum * > CHECKSUMS && cd ..

      - name: Create Release and Upload Asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ inputs.tag_name || github.ref_name }}"
          # Grabs file from repo tree and uploads with a label
          gh release create "$TAG" \
            "./docker/manage-ohb-docker-$TAG.sh#Manage OHB Docker Installs" \
            "./dist/verify_firmware_integrity-$TAG.pl#Firmware Integrity Utility" \
            "dist/OHB-$TAG.tar.gz#OHB Source Tarball" \
            "dist/OHB-$TAG.zip#OHB Source Zip" \
            "dist/CHECKSUMS#Asset Checksums" \
            --title "OHB Release: $TAG" \
            --generate-notes
